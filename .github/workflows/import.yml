name: Import données pool

on:
  # Déclenchement manuel depuis l'onglet Actions sur GitHub
  workflow_dispatch:

  # Schedule automatique : tous les lundis à 6h00 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Déclenchement automatique à chaque push de CSV d'équipe
  push:
    paths:
      - 'python_script/teams_offline/**.csv'

jobs:
  import:
    name: Import joueurs, contrats et repêchage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python_script/requirements.txt

      - name: Installer les dépendances
        run: pip install -r python_script/requirements.txt

      - name: Import joueurs et contrats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python python_script/import_supabase.py

      - name: Import données de repêchage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python python_script/import_drafts.py
