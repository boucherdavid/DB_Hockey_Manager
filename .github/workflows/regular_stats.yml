name: Mise à jour stats saison régulière

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Déclenchement manuel depuis l'onglet Actions sur GitHub
  workflow_dispatch:
    inputs:
      date:
        description: 'Date à traiter (YYYY-MM-DD). Vide = hier ET.'
        required: false
        default: ''

  # Une fois par jour à 6h UTC (2h ET) — après la fin des matchs du soir
  schedule:
    - cron: '0 6 * * *'

jobs:
  update-regular-stats:
    name: Import game-logs saison régulière
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python_script/requirements.txt

      - name: Installer les dépendances
        run: pip install -r python_script/requirements.txt

      - name: Mettre à jour les stats saison régulière
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python python_script/import_regular_stats.py --date "${{ github.event.inputs.date }}"
          else
            python python_script/import_regular_stats.py
          fi
